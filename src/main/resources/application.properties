spring.application.name=course-platform

server.port=${PORT:8081}

# Load local dotenv values when present, while still allowing real environment variables to override them.
spring.config.import=optional:file:.env[.properties]

# PostgreSQL Connection Pipeline via Environment Variables
spring.datasource.url=${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/courseplatform}}
spring.datasource.username=${PGUSER:${DATABASE_USERNAME:sa}}
spring.datasource.password=${PGPASSWORD:${DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate DDL Engine & Query Formatting
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration System
jwt.secret=${JWT_SECRET:change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Modern Springdoc OpenAPI UI Path Mapping
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs

# Semantic Local Machine Learning Directives
embedding.model=sentence-transformers/all-MiniLM-L6-v2
embedding.dimension=384